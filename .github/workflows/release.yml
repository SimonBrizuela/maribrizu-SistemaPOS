name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller firebase-admin cryptography

      - name: Write firebase_key.json
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        shell: pwsh
        run: |
          $env:FIREBASE_KEY | Out-File -FilePath firebase_key.json -Encoding utf8 -NoNewline

      - name: Patch APP_VERSION in config.py
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content pos_system/config.py) -replace 'APP_VERSION\s*=\s*"[^"]*"', "APP_VERSION = `"$tag`"" | Set-Content pos_system/config.py
          Write-Host "APP_VERSION patched to $tag"

      - name: Build portable
        run: python build_app.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SistemaPOS_Portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
